<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'informatica verde non perde — Educazione Civica</title>
    <meta name="description" content="Sito di Educazione Civica su sostenibilità, Agenda 2030, green computing, fotovoltaico e sport sostenibile." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet" />
    <style>
      /* Hide Google Translate UI but keep widget functional */
      #google_translate_element { position: fixed; top: -9999px; left: -9999px; opacity: 0; pointer-events: none; }
      .goog-te-banner-frame, .skiptranslate { display: none !important; }
      body { top: 0 !important; }
      .goog-tooltip, .goog-tooltip:hover, .goog-text-highlight { display: none !important; background: none !important; box-shadow: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="google_translate_element" aria-hidden="true"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          { pageLanguage: 'it', includedLanguages: 'en,it', autoDisplay: false },
          'google_translate_element'
        );
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" async></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
